<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=0">
    <title>Unit 2: Don't Worry. Be Happy! - 快樂學單字</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --dopamine-pink: #FF7EB9;
            --dopamine-yellow: #FFFB7D;
            --dopamine-cyan: #85FFBD;
            --dopamine-purple: #A29BFE;
        }

        body {
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
            background-color: #F8FAFC;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .dopamine-gradient {
            background: linear-gradient(135deg, #85FFBD 0%, #FFFB7D 100%);
        }

        .btn-bounce:active {
            transform: scale(0.95);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }

        @keyframes success-pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .animate-success { animation: success-pulse 0.6s ease-out; }

        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- 頂部狀態列 -->
    <header class="safe-top bg-white border-b-4 border-yellow-300 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-black text-pink-500 tracking-tighter italic">Unit 2: <span class="text-cyan-500">Don't Worry. Be Happy!</span></h1>
        <div id="connection-status" class="hidden text-[10px] font-bold px-2 py-1 rounded-full bg-red-100 text-red-500">
            語音功能受限
        </div>
    </header>

    <!-- 主要內容區 -->
    <main id="app-container" class="max-w-md mx-auto p-4 mb-24">
        <div id="view-flashcards" class="view-content"></div>
        <div id="view-challenges" class="view-content hidden"></div>
        <div id="view-logs" class="view-content hidden"></div>
        <div id="view-game" class="view-content hidden"></div>
    </main>

    <!-- 底部導覽列 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-pink-200 px-4 pt-2 pb-safe flex justify-around items-center z-50">
        <button onclick="switchView('flashcards')" class="nav-item flex flex-col items-center p-2 text-pink-500">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path></svg>
            <span class="text-[10px] font-black mt-1 uppercase">單字卡</span>
        </button>
        <button onclick="switchView('challenges')" class="nav-item flex flex-col items-center p-2 text-gray-400">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"></path></svg>
            <span class="text-[10px] font-black mt-1 uppercase">關卡挑戰</span>
        </button>
        <button onclick="switchView('logs')" class="nav-item flex flex-col items-center p-2 text-gray-400">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>
            <span class="text-[10px] font-black mt-1 uppercase">學習日誌</span>
        </button>
    </nav>

    <!-- 提示框 -->
    <div id="toast" class="fixed top-24 left-1/2 transform -translate-x-1/2 z-[100] hidden transition-all duration-300">
        <div class="bg-white border-4 border-cyan-400 rounded-2xl px-6 py-3 shadow-2xl font-bold text-center">
            <p id="toast-msg" class="text-cyan-600"></p>
        </div>
    </div>

    <!-- 遊戲結算彈窗 -->
    <div id="game-modal" class="fixed inset-0 bg-black/60 z-[200] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden border-8 border-cyan-300">
            <div class="bg-cyan-300 p-6 text-center">
                <h2 class="text-3xl font-black text-white italic">關卡完成！</h2>
            </div>
            <div class="p-6 text-center">
                <div id="game-results" class="space-y-2 mb-6 text-center"></div>
                <div class="bg-pink-50 rounded-2xl p-4 mb-6">
                    <p class="text-pink-600 font-bold italic text-sm" id="teacher-comment"></p>
                </div>
                <button onclick="closeModal()" class="w-full bg-yellow-400 hover:bg-yellow-500 py-4 rounded-2xl font-black text-xl shadow-lg btn-bounce text-white">繼續前進！</button>
            </div>
        </div>
    </div>

    <script>
        // --- 單字資料 ---
        const vocabData = [
            {id:1, word:'content', pos:'adj.', ch:'滿意的，滿足的', speakText: 'con-TENT'},
            {id:2, word:'nevertheless', pos:'adv.', ch:'然而，儘管如此'},
            {id:3, word:'concept', pos:'n.', ch:'概念，觀念'},
            {id:4, word:'pronounce', pos:'vt.', ch:'發……的音，發音'},
            {id:5, word:'pronunciation', pos:'n.', ch:'發音'},
            {id:6, word:'atmosphere', pos:'n.', ch:'氣氛，氛圍'},
            {id:7, word:'fascinated', pos:'adj.', ch:'著迷的'},
            {id:8, word:'fascinate', pos:'vt.', ch:'使著迷'},
            {id:9, word:'sigh', pos:'vi.; vt. / n.', ch:'嘆氣，嘆息'},
            {id:10, word:'roughly', pos:'adv.', ch:'大約，約略地'},
            {id:11, word:'rough', pos:'adj.', ch:'約略的'},
            {id:12, word:'passive', pos:'adj.', ch:'消極的，被動的'},
            {id:13, word:'encounter', pos:'vt.', ch:'遭遇，遇到'}, // 第 1 階段結束 (Index 12)
            {id:14, word:'frustration', pos:'n.', ch:'挫折，沮喪'}, // 第 2 階段開始 (Index 13)
            {id:15, word:'frustrate', pos:'vt.', ch:'使挫折，使沮喪'},
            {id:16, word:'devote', pos:'vt.', ch:'奉獻……'},
            {id:17, word:'devoted', pos:'adj.', ch:'熱愛……的，奉獻於……'},
            {id:18, word:'remaining', pos:'adj.', ch:'剩下的'},
            {id:19, word:'remain', pos:'vi.', ch:'繼續存在；保持不變'},
            {id:20, word:'stubborn', pos:'adj.', ch:'固執的，倔強的'},
            {id:21, word:'stuff', pos:'n.', ch:'事情；東西'},
            {id:22, word:'try out', pos:'phrase', ch:'試驗，試用'},
            {id:23, word:'put...into practice', pos:'phrase', ch:'將……付諸實行'},
            {id:24, word:'let go of sth', pos:'phrase', ch:'放下……'},
            {id:25, word:'look forward to', pos:'phrase', ch:'期待，盼望'},
            {id:26, word:'in other words', pos:'phrase', ch:'換句話說，也就是說'},
            {id:27, word:'do one’s best', pos:'phrase', ch:'全力以赴，盡全力'}
        ];

        let userStats = {
            learned: [],
            wordTracking: {},
            goodPronunciations: [],
            highScores: { reflex: 0, memory: 999, spelling: 0 }
        };

        // --- 音效系統 (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSuccessSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playErrorSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function loadStats() {
            const saved = localStorage.getItem('dopamine_stats');
            if (saved) userStats = JSON.parse(saved);
        }

        function saveStats() {
            localStorage.setItem('dopamine_stats', JSON.stringify(userStats));
        }

        let currentCardIndex = 0;
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];
        let recognition;

        window.onload = () => {
            loadStats();
            initSpeech();
            switchView('flashcards');
        };

        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.onresult = (event) => {
                    const result = event.results[0][0].transcript.toLowerCase();
                    processPronunciation(result, vocabData[currentCardIndex].word.toLowerCase());
                };
                recognition.onerror = () => stopRecordingState();
            }
        }

        function switchView(view) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(v => v.classList.replace('text-pink-500', 'text-gray-400'));
            const target = document.getElementById(`view-${view}`);
            if (target) target.classList.remove('hidden');

            const navItems = document.querySelectorAll('.nav-item');
            if (view === 'flashcards') { navItems[0].classList.replace('text-gray-400', 'text-pink-500'); renderFlashcards(); }
            else if (view === 'challenges') { navItems[1].classList.replace('text-gray-400', 'text-pink-500'); renderChallenges(); }
            else if (view === 'logs') { navItems[2].classList.replace('text-gray-400', 'text-pink-500'); renderLogs(); }
        }

        // --- 模組一：單字卡 ---
        function renderFlashcards() {
            const container = document.getElementById('view-flashcards');
            const word = vocabData[currentCardIndex];
            if (!userStats.wordTracking[word.id]) userStats.wordTracking[word.id] = {views: 0, listens: 0};
            userStats.wordTracking[word.id].views++;
            checkLearningStatus(word.id);

            container.innerHTML = `
                <div class="flex flex-col items-center py-4">
                    <div class="w-full flex justify-between items-center mb-6 px-2">
                        <span class="bg-yellow-300 text-pink-600 font-black px-4 py-1 rounded-full text-xs">單字進度 ${currentCardIndex + 1}/${vocabData.length}</span>
                        ${userStats.learned.includes(word.id) ? '<span class="text-green-500 font-bold text-sm">✨ 已學會</span>' : ''}
                    </div>

                    <div id="flashcard" class="relative w-full aspect-[4/5] perspective-1000 cursor-pointer" onclick="flipCard()">
                        <div class="card-inner w-full h-full relative duration-500 shadow-xl rounded-[3rem] border-8 border-white">
                            <div class="card-front absolute inset-0 dopamine-gradient rounded-[2.5rem] flex flex-col items-center justify-center p-8 text-center">
                                <h2 class="text-4xl font-black text-gray-800 break-words w-full mb-4">${word.word}</h2>
                                <p class="text-lg font-bold text-pink-500 italic uppercase tracking-widest">${word.pos}</p>
                                <p class="mt-8 text-gray-400 text-xs font-bold tracking-widest uppercase italic">點擊翻面</p>
                            </div>
                            <div class="card-back absolute inset-0 bg-white rounded-[2.5rem] flex flex-col items-center justify-center p-8 text-center">
                                <h2 class="text-3xl font-black text-pink-500">${word.ch}</h2>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-3 w-full mt-8">
                        <button onclick="prevCard(event)" class="bg-white border-4 border-gray-100 p-4 rounded-3xl flex items-center justify-center btn-bounce">
                            <svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <button onclick="playAudio(event)" title="音檔鍵" class="bg-yellow-400 border-4 border-yellow-200 p-4 rounded-3xl flex items-center justify-center btn-bounce shadow-lg shadow-yellow-100 text-white">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                        </button>
                        <button id="mic-btn" onclick="toggleMic(event)" title="錄音鍵" class="bg-pink-500 shadow-lg shadow-pink-100 p-4 rounded-3xl flex items-center justify-center btn-bounce relative text-white">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 10v1a7 7 0 01-14 0v-1m7 11v-4m-3 4h6"></path></svg>
                            <div id="recording-pulse" class="absolute inset-0 rounded-3xl bg-pink-400 animate-ping hidden"></div>
                        </button>
                        <button onclick="nextCard(event)" class="bg-white border-4 border-cyan-300 p-4 rounded-3xl flex items-center justify-center btn-bounce">
                            <svg class="w-6 h-6 text-cyan-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>

                    <div id="pronounce-feedback" class="mt-6 w-full hidden">
                        <div class="bg-white rounded-[2rem] p-5 border-4 border-dashed border-gray-100 flex flex-col items-center text-center">
                            <p id="sim-score" class="text-xl font-black mb-4"></p>
                            <button id="play-back-btn" class="bg-cyan-500 text-white shadow-lg shadow-cyan-100 px-8 py-3 rounded-2xl text-sm font-black btn-bounce uppercase tracking-tighter italic">
                                👂 播放我的錄音
                            </button>
                        </div>
                    </div>

                    <p class="mt-8 text-[11px] text-gray-400 font-bold tracking-wide">💡 查看卡片 2 次並播放發音 1 次即可學會！</p>
                </div>
            `;
        }

        function flipCard() { document.getElementById('flashcard').classList.toggle('card-flipped'); }
        function nextCard(e) { e.stopPropagation(); if(currentCardIndex < vocabData.length-1) { currentCardIndex++; renderFlashcards(); } }
        function prevCard(e) { e.stopPropagation(); if(currentCardIndex > 0) { currentCardIndex--; renderFlashcards(); } }

        function playAudio(e) {
            e.stopPropagation();
            const word = vocabData[currentCardIndex];
            speak(word.speakText || word.word);
            userStats.wordTracking[word.id].listens++;
            checkLearningStatus(word.id);
        }

        function checkLearningStatus(id) {
            const track = userStats.wordTracking[id];
            if (track.views >= 2 && track.listens >= 1 && !userStats.learned.includes(id)) {
                userStats.learned.push(id);
                showToast("✨ 成功學會一個新單字！");
            }
            saveStats();
        }

        function toggleMic(e) {
            e.stopPropagation(); if (isRecording) return;
            isRecording = true; document.getElementById('recording-pulse').classList.remove('hidden'); audioChunks = [];
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioUrl = URL.createObjectURL(new Blob(audioChunks, { type: 'audio/wav' }));
                    document.getElementById('play-back-btn').onclick = () => new Audio(audioUrl).play();
                };
                mediaRecorder.start(); if (recognition) recognition.start();
                setTimeout(stopRecordingState, 3000);
            }).catch(() => stopRecordingState());
        }

        function stopRecordingState() {
            isRecording = false; const p = document.getElementById('recording-pulse'); if(p) p.classList.add('hidden');
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            if (recognition) try { recognition.stop(); } catch(e){}
        }

        function processPronunciation(heard, target) {
            const similarity = calculateSimilarity(heard, target);
            const feedback = document.getElementById('pronounce-feedback');
            const scoreDisplay = document.getElementById('sim-score');
            const wordId = vocabData[currentCardIndex].id;
            feedback.classList.remove('hidden');
            if (similarity >= 60) {
                playSuccessSound(); const isExcel = similarity >= 85;
                scoreDisplay.innerText = isExcel ? "Excellent! ✨ 太準了！" : "Good! 👍 不錯喔！";
                scoreDisplay.className = `text-xl font-black ${isExcel ? 'text-green-500' : 'text-yellow-500'}`;
                if (!userStats.goodPronunciations.includes(wordId)) { userStats.goodPronunciations.push(wordId); saveStats(); }
            } else {
                playErrorSound(); scoreDisplay.innerText = "Try again! 🎤 再大聲一點！";
                scoreDisplay.className = "text-xl font-black text-red-400";
            }
        }

        // --- 模組二：挑戰 (加入階段選擇) ---
        function renderChallenges() {
            const container = document.getElementById('view-challenges');
            container.innerHTML = `
                <div class="space-y-6 py-4">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-4xl font-black text-gray-800 italic uppercase tracking-tighter">單字競技場</h2>
                        <span class="bg-pink-100 text-pink-500 px-3 py-1 rounded-full text-[10px] font-black uppercase">選擇挑戰</span>
                    </div>
                    <div onclick="selectStageMenu(1)" class="bg-white border-b-8 border-pink-400 p-6 rounded-[2.5rem] flex items-center justify-between cursor-pointer btn-bounce shadow-sm">
                        <div><h3 class="text-xl font-black text-pink-500">眼明手快 (Reflex)</h3><p class="text-gray-400 text-xs font-bold">考驗單字直覺聯想力</p></div>
                        <div class="text-right"><p class="text-[8px] text-gray-300 font-black uppercase">最高分</p><p class="text-lg font-black text-pink-400">${userStats.highScores.reflex}</p></div>
                    </div>
                    <div onclick="selectStageMenu(2)" class="bg-white border-b-8 border-cyan-400 p-6 rounded-[2.5rem] flex items-center justify-between cursor-pointer btn-bounce shadow-sm">
                        <div><h3 class="text-xl font-black text-cyan-500">記憶配對 (Memory)</h3><p class="text-gray-400 text-xs font-bold">4x4 終極記憶挑戰</p></div>
                        <div class="text-right"><p class="text-[8px] text-gray-300 font-black uppercase">最短秒數</p><p class="text-lg font-black text-cyan-400">${userStats.highScores.memory === 999 ? '-' : userStats.highScores.memory + 's'}</p></div>
                    </div>
                    <div onclick="selectStageMenu(3)" class="bg-white border-b-8 border-yellow-400 p-6 rounded-[2.5rem] flex items-center justify-between cursor-pointer btn-bounce shadow-sm">
                        <div><h3 class="text-xl font-black text-yellow-600">拼字大師 (Spelling)</h3><p class="text-gray-400 text-xs font-bold">完美英文拼寫訓練</p></div>
                        <div class="text-right"><p class="text-[8px] text-gray-300 font-black uppercase">最高分</p><p class="text-lg font-black text-yellow-500">${userStats.highScores.spelling}</p></div>
                    </div>
                </div>
            `;
        }

        // 新增：選擇階段選單
        function selectStageMenu(lv) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
            const gameView = document.getElementById('view-game');
            gameView.classList.remove('hidden');
            
            gameView.innerHTML = `
                <div class="py-8 text-center space-y-8">
                    <button onclick="switchView('challenges')" class="text-gray-300 font-black text-[10px] uppercase flex items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> 返回大廳</button>
                    <h2 class="text-3xl font-black text-gray-800 italic uppercase">選擇挑戰範圍</h2>
                    <div class="grid grid-cols-1 gap-4">
                        <button onclick="startLevelWithStage(${lv}, 1)" class="p-8 bg-white border-b-8 border-pink-400 rounded-[2.5rem] btn-bounce">
                            <p class="text-2xl font-black text-pink-500">第一階段</p>
                            <p class="text-gray-400 text-xs font-bold mt-1">content 到 encounter</p>
                        </button>
                        <button onclick="startLevelWithStage(${lv}, 2)" class="p-8 bg-white border-b-8 border-cyan-400 rounded-[2.5rem] btn-bounce">
                            <p class="text-2xl font-black text-cyan-500">第二階段</p>
                            <p class="text-gray-400 text-xs font-bold mt-1">frustration 到 do one's best</p>
                        </button>
                    </div>
                </div>
            `;
        }

        function startLevelWithStage(lv, stage) {
            let data;
            if (stage === 1) { data = vocabData.slice(0, 13); } 
            else { data = vocabData.slice(13); }
            
            const gameView = document.getElementById('view-game');
            if (lv === 1) initReflex(gameView, data);
            if (lv === 2) initMemory(gameView, data);
            if (lv === 3) initSpelling(gameView, data);
        }

        function initReflex(view, data) {
            let score = 0; let q = 0;
            const quiz = [...data].sort(() => 0.5 - Math.random()).slice(0, 10);
            const next = () => {
                if (q >= quiz.length) { endGame('Reflex', score, "你的反應快得像閃電！⚡"); return; }
                const target = quiz[q];
                const opts = [...data.filter(v => v.id !== target.id).sort(() => 0.5-Math.random()).slice(0,3), target].sort(() => 0.5-Math.random());
                view.innerHTML = `
                    <div class="py-4">
                        <button onclick="switchView('challenges')" class="mb-4 text-gray-300 font-black text-[10px] uppercase flex items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> 離開關卡</button>
                        <div class="flex justify-between items-end mb-8"><span class="text-3xl font-black text-pink-500 italic">得分: ${score}</span><span class="text-gray-300 font-black text-xs uppercase tracking-widest">題次 ${q+1}/${quiz.length}</span></div>
                        <div class="bg-white py-12 rounded-[3rem] border-8 border-pink-100 text-center mb-8 shadow-xl"><h2 class="text-4xl font-black text-gray-800">${target.word}</h2></div>
                        <div class="grid grid-cols-1 gap-3">${opts.map(o => `<button onclick="this.disabled=true; checkR(this, ${o.id===target.id})" class="w-full bg-white p-5 rounded-2xl border-4 border-gray-100 font-bold text-lg btn-bounce">${o.ch}</button>`).join('')}</div>
                    </div>
                `;
            };
            window.checkR = (b, c) => { 
                if(c) { playSuccessSound(); score += 100; b.classList.replace('border-gray-100', 'border-green-400'); } 
                else { playErrorSound(); b.classList.replace('border-gray-100', 'border-red-400'); }
                q++; setTimeout(next, 600); 
            };
            next();
        }

        function initMemory(view, data) {
            const sampleCount = data.length >= 8 ? 8 : data.length;
            const words = [...data].sort(() => 0.5 - Math.random()).slice(0, sampleCount);
            let cards = []; words.forEach(w => { cards.push({id: w.id, t: w.word, type: 'en', matched: false}); cards.push({id: w.id, t: w.ch, type: 'ch', matched: false}); });
            cards.sort(() => 0.5 - Math.random());
            let sel = []; let matchedCount = 0; let time = 0;
            const timer = setInterval(() => time++, 1000);
            const render = () => {
                view.innerHTML = `
                    <div class="py-4">
                        <button onclick="clearInterval(${timer}); switchView('challenges')" class="mb-4 text-gray-300 font-black text-[10px] uppercase flex items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> 離開關卡</button>
                        <div class="flex justify-between items-center mb-6"><h3 class="text-2xl font-black text-cyan-500 italic">計時: ${time}s</h3></div>
                        <div class="grid grid-cols-4 gap-2">
                            ${cards.map((c, i) => `<div onclick="selM(${i})" id="mc-${i}" class="h-20 bg-white rounded-xl border-2 ${c.matched ? 'border-green-200 opacity-20 shadow-none' : 'border-gray-100 shadow-sm'} flex items-center justify-center p-1 text-center text-[10px] font-black transition-all active:scale-95 cursor-pointer overflow-hidden leading-tight"><span class="${c.matched ? 'text-green-500' : 'text-gray-700'}">${c.t}</span></div>`).join('')}
                        </div>
                    </div>
                `;
            };
            window.selM = (i) => {
                if (sel.length >= 2 || cards[i].matched || sel.includes(i)) return;
                sel.push(i); const el = document.getElementById(`mc-${i}`); if (el) el.classList.add('border-cyan-400', 'bg-cyan-50', 'scale-105', 'z-10');
                if (sel.length === 2) {
                    const [a, b] = sel;
                    if (cards[a].id === cards[b].id && cards[a].type !== cards[b].type) {
                        playSuccessSound(); cards[a].matched = cards[b].matched = true; matchedCount += 2;
                        setTimeout(() => { sel = []; render(); if (matchedCount === cards.length) { clearInterval(timer); endGame('Memory', time, "你的記憶力簡直無懈可擊！🤖"); } }, 400);
                    } else {
                        playErrorSound(); setTimeout(() => {
                            const elA = document.getElementById(`mc-${a}`); const elB = document.getElementById(`mc-${b}`);
                            if(elA) elA.classList.replace('border-cyan-400', 'border-red-300'); if(elB) elB.classList.replace('border-cyan-400', 'border-red-300');
                            setTimeout(() => { sel = []; render(); }, 400);
                        }, 500);
                    }
                }
            };
            render();
        }

        function initSpelling(view, data) {
            let score = 0; let q = 0;
            const quiz = [...data].sort(() => 0.5 - Math.random()).slice(0, 5);
            const next = () => {
                if (q >= quiz.length) { endGame('Spelling', score, "拼寫大師非你莫屬！🧠"); return; }
                const target = quiz[q];
                view.innerHTML = `
                    <div class="py-4">
                        <button onclick="switchView('challenges')" class="mb-4 text-gray-300 font-black text-[10px] uppercase flex items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> 離開關卡</button>
                        <div class="flex justify-between mb-8"><span class="text-3xl font-black text-yellow-500 italic text-shadow">得分: ${score}</span><span class="text-gray-300 font-black text-xs uppercase">題次 ${q+1}/${quiz.length}</span></div>
                        <div id="spelling-card" class="bg-white w-full py-10 rounded-[3rem] border-8 border-yellow-100 text-center mb-8 shadow-xl"><p class="text-pink-400 font-black text-[10px] mb-1 uppercase tracking-widest">${target.pos}</p><h2 class="text-2xl font-black text-gray-800">${target.ch}</h2></div>
                        <input type="text" id="spell-in" autocomplete="off" autofocus class="w-full bg-white border-4 border-yellow-300 p-5 rounded-3xl text-center text-2xl font-black outline-none mb-6 shadow-inner transition-all" placeholder="在此輸入英文單字">
                        <button id="spell-btn" onclick="checkS()" class="w-full bg-yellow-400 py-5 rounded-3xl font-black text-2xl text-white shadow-lg btn-bounce">提交答案</button>
                    </div>
                `;
                setTimeout(() => { const input = document.getElementById('spell-in'); if(input) input.focus(); }, 100);
            };
            window.checkS = () => {
                const input = document.getElementById('spell-in'); const btn = document.getElementById('spell-btn'); const card = document.getElementById('spelling-card');
                if (!input || btn.disabled) return; btn.disabled = true;
                if (input.value.trim().toLowerCase() === quiz[q].word.toLowerCase()) {
                    playSuccessSound(); score += 200; input.classList.add('border-green-400', 'bg-green-50', 'animate-success'); card.classList.add('border-green-100');
                    setTimeout(() => { q++; next(); }, 1000);
                } else {
                    playErrorSound(); input.classList.add('border-red-400', 'bg-red-50', 'animate-shake'); showToast(`正確答案：${quiz[q].word}`);
                    setTimeout(() => { q++; next(); }, 1500);
                }
            };
            next();
        }

        // --- 模組三：學習日誌 ---
        function renderLogs() {
            const container = document.getElementById('view-logs');
            const percent = Math.round((userStats.learned.length / vocabData.length) * 100);
            const learnedWordList = userStats.learned.map(id => vocabData.find(v => v.id === id)?.word).filter(Boolean);
            container.innerHTML = `
                <div class="py-4 space-y-8">
                    <div class="flex items-center justify-between"><h2 class="text-4xl font-black text-gray-800 italic uppercase tracking-tighter">學習日誌</h2><button onclick="resetStats()" class="bg-red-50 text-red-400 px-3 py-1 rounded-full text-[8px] font-black uppercase">清除紀錄</button></div>
                    <div class="bg-white rounded-[2.5rem] p-8 border-b-8 border-pink-300 shadow-sm relative overflow-hidden">
                        <div class="relative z-10 flex items-center justify-between text-shadow">
                            <div class="text-left">
                                <h3 class="text-gray-400 font-black text-[10px] uppercase tracking-widest mb-1">掌握程度</h3>
                                <div class="text-5xl font-black text-pink-500">${percent}%</div>
                            </div>
                            <div class="w-16 h-16 border-4 border-pink-50 rounded-full flex items-center justify-center shadow-inner"><span class="text-pink-500 font-black text-lg">${userStats.learned.length}</span></div>
                        </div>
                        <div class="w-full bg-gray-50 h-3 rounded-full mt-6 overflow-hidden"><div class="bg-pink-400 h-full transition-all duration-1000" style="width: ${percent}%"></div></div>
                        <div class="mt-8">
                            <h4 class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-3 italic">我學會的單字清單</h4>
                            <div class="flex flex-wrap gap-2">
                                ${learnedWordList.length === 0 ? '<p class="text-gray-300 text-[10px] italic">快去挑戰單字卡吧！</p>' : learnedWordList.map(w => `<span class="bg-pink-50 text-pink-500 px-3 py-1 rounded-lg text-[10px] font-black border border-pink-100 uppercase">${w}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border-b-8 border-cyan-300">
                        <h4 class="font-black text-gray-700 text-xs mb-4 uppercase tracking-tighter flex items-center"><span class="mr-2">🏆</span> 發音成就館</h4>
                        <div class="flex flex-wrap gap-2">
                            ${userStats.goodPronunciations.length === 0 ? '<p class="text-gray-300 text-[10px] italic py-2">目前還沒有獎牌...</p>' : userStats.goodPronunciations.map(id => { const w = vocabData.find(v => v.id === id); return `<span class="bg-cyan-50 text-cyan-600 px-3 py-1 rounded-xl text-[10px] font-black border border-cyan-100 uppercase">${w.word}</span>`; }).join('')}
                        </div>
                    </div>
                    <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border-b-8 border-yellow-300">
                        <h4 class="font-black text-gray-700 text-xs mb-4 uppercase tracking-tighter flex items-center"><span class="mr-2">🎮</span> 闖關名人堂</h4>
                        <div class="space-y-2">
                            <div class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl"><span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">眼明手快 (Reflex)</span><span class="text-sm font-black text-pink-500">${userStats.highScores.reflex} 分</span></div>
                            <div class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl"><span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">記憶配對 (Memory)</span><span class="text-sm font-black text-cyan-500">${userStats.highScores.memory === 999 ? '-' : userStats.highScores.memory + ' 秒'}</span></div>
                            <div class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl"><span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">拼字大師 (Spelling)</span><span class="text-sm font-black text-yellow-600">${userStats.highScores.spelling} 分</span></div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- 輔助工具 ---
        function calculateSimilarity(s1, s2) { let m = 0; s1 = s1.trim().toLowerCase(); s2 = s2.trim().toLowerCase(); for(let i=0; i<Math.min(s1.length, s2.length); i++) if(s1[i]===s2[i]) m++; return (m/s2.length)*100; }
        function speak(text) { const utter = new SpeechSynthesisUtterance(text); utter.lang = 'en-US'; utter.rate = 0.9; window.speechSynthesis.speak(utter); }
        function showToast(msg) { const toast = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg; toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 2500); }
        function endGame(level, score, comment) { const modal = document.getElementById('game-modal'); const resDiv = document.getElementById('game-results'); if (level === 'Reflex' && score > userStats.highScores.reflex) userStats.highScores.reflex = score; if (level === 'Memory' && score < userStats.highScores.memory) userStats.highScores.memory = score; if (level === 'Spelling' && score > userStats.highScores.spelling) userStats.highScores.spelling = score; saveStats(); resDiv.innerHTML = `<div class="text-gray-300 font-black uppercase text-[10px] mb-1 tracking-widest">本次成績</div><div class="text-5xl font-black text-gray-800">${level === 'Memory' ? score + 's' : score}</div>`; document.getElementById('teacher-comment').innerText = comment; modal.classList.remove('hidden'); }
        function closeModal() { document.getElementById('game-modal').classList.add('hidden'); switchView('challenges'); }
        function resetStats() { if (confirm("確定要刪除所有紀錄嗎？這會清除你的所有進度喔！")) { localStorage.removeItem('dopamine_stats'); location.reload(); } }
    </script>
</body>
</html>
